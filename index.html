<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BasketFlow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222535;
    --border: #2e3247;
    --accent: #4f9cf9;
    --accent2: #7c5cfc;
    --green: #22c55e;
    --amber: #f59e0b;
    --text: #e8eaf0;
    --muted: #6b7280;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .progress-pill {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.3s;
  }

  .progress-pill.active { color: var(--green); border-color: var(--green); }

  .container { max-width: 640px; margin: 0 auto; padding: 20px 16px 40px; }

  /* INPUT SECTION */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }

  .input-card label {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    display: block;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    height: 110px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  .btn {
    flex: 1;
    padding: 13px 10px;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--accent); }

  .btn-ocr {
    background: var(--surface2);
    color: var(--amber);
    border: 1px solid var(--border);
    flex: 0 0 auto;
    padding: 13px 16px;
  }

  .btn-ocr:hover { border-color: var(--amber); }

  #imageInput { display: none; }

  /* STATUS BAR */
  .status-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 12px;
    display: none;
    align-items: center;
    gap: 8px;
  }

  .status-bar.visible { display: flex; }
  .status-bar.loading { color: var(--accent); border-color: var(--accent); }
  .status-bar.error { color: #f87171; border-color: #f87171; }
  .status-bar.success { color: var(--green); border-color: var(--green); }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(79,156,249,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* HABITS */
  .habits-bar {
    background: var(--surface);
    border: 1px solid var(--amber);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--amber);
    margin-bottom: 12px;
    display: none;
  }

  .habits-bar.visible { display: block; }

  /* SECTIONS */
  .section {
    margin-bottom: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .section-header {
    padding: 10px 14px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    background: var(--surface2);
    display: flex;
    justify-content: space-between;
  }

  .section-count {
    background: var(--surface);
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 11px;
  }

  /* ITEMS */
  .item {
    padding: 13px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--border);
    transition: all 0.2s;
  }

  .item:first-of-type { border-top: none; }

  .item.done { opacity: 0.35; }

  .item-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    padding: 0;
  }

  .item-check:hover { border-color: var(--green); }
  .item.done .item-check { background: var(--green); border-color: var(--green); }
  .item.done .item-check::after { content: '✓'; color: white; font-size: 12px; }

  .item-info { flex: 1; min-width: 0; }

  .item-name {
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item.done .item-name { text-decoration: line-through; }

  .item-source {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-search {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .item-search:hover { background: var(--accent); color: white; border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <span style="font-size:1.3rem">🛒</span>
  <h1>BasketFlow</h1>
  <div class="progress-pill" id="progress" style="display:none"></div>
</header>

<div class="container">

  <div class="input-card">
    <label>Shopping List</label>
    <textarea id="inputList" placeholder="Paste your list here, or use the camera button to scan a handwritten list…"></textarea>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="buildWithAI()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>
        Build List
      </button>
      <button class="btn btn-ocr" onclick="document.getElementById('imageInput').click()" title="Scan handwritten list">
        📷 Scan
      </button>
    </div>
    <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)">
  </div>

  <div class="status-bar" id="statusBar">
    <div class="spinner" id="spinner"></div>
    <span id="statusText"></span>
  </div>

  <div class="habits-bar" id="habitsBar"></div>

  <div id="list"></div>

</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────

const usuals = ["milk", "bread"];

const categories = {
  "Protein":    ["chicken","beef","sausage","sausages","eggs","mince","tuna","bacon","pork","ham","fish"],
  "Fruit & Veg":["carrot","broccoli","pepper","courgette","avocado","spinach","banana","apple","apples","orange","oranges","lettuce","tomato","onion","potato"],
  "Dairy":      ["milk","yoghurt","cheese","kefir","butter","cream"],
  "Bread & Carbs":["pasta","rice","wrap","bread","loaf","spaghetti","bagel","roll","rolls","scone","scones"],
  "Pantry":     ["jam","sauce","spread","oil","beans","vinegar","pickle","ketchup"],
  "Household":  ["washing","washing up","bin","clean","shower","drain","kitchen roll","lenor","liquid"],
  "Snacks":     ["crisp","crisps","biscuit","biscuits","snack","bar","kit kat","kitkat","ginger nut"],
  "Drinks":     ["drink","drinks","tonic","water","juice","coffee","tea","teabag","teabags","kefir"],
  "Pharmacy":   ["steradent","gel","paracetamol","ibuprofen"],
};

let items = [];

// ─── STATUS ──────────────────────────────────────────────────────────────────

function setStatus(type, text) {
  const bar = document.getElementById("statusBar");
  const spinner = document.getElementById("spinner");
  const statusText = document.getElementById("statusText");
  bar.className = "status-bar visible " + type;
  spinner.style.display = type === "loading" ? "block" : "none";
  statusText.textContent = text;
  if (type !== "loading") setTimeout(() => bar.classList.remove("visible"), 3500);
}

// ─── OCR: IMAGE → TEXT (Tesseract.js) ────────────────────────────────────────

async function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  setStatus("loading", "Reading image… this may take a moment");

  try {
    const imageURL = URL.createObjectURL(file);

    const result = await Tesseract.recognize(imageURL, "eng", {
      logger: m => {
        if (m.status === "recognizing text") {
          const pct = Math.round(m.progress * 100);
          setStatus("loading", `Reading image… ${pct}%`);
        }
      }
    });

    URL.revokeObjectURL(imageURL);

    // Clean up Tesseract output: remove blank lines and very short noise lines
    const lines = result.data.text
      .split("\n")
      .map(l => l.trim())
      .filter(l => l.length > 2);

    if (!lines.length) {
      setStatus("error", "Couldn't read anything — try a clearer photo");
      event.target.value = "";
      return;
    }

    const extracted = lines.join("\n");
    const textarea = document.getElementById("inputList");
    const existing = textarea.value.trim();
    textarea.value = existing ? existing + "\n" + extracted : extracted;

    setStatus("success", `${lines.length} lines extracted — review then tap Build List`);

  } catch (e) {
    console.error(e);
    setStatus("error", "OCR failed — try a clearer, well-lit photo");
  }

  event.target.value = "";
}

// ─── BUILD LIST (local only) ──────────────────────────────────────────────────

function buildWithAI() {
  const raw = document.getElementById("inputList").value.trim();
  if (!raw) return;

  const lines = raw.split("\n");

  const typoMap = {
    "chxiken": "chicken", "chiken": "chicken", "chieken": "chicken",
    "corriander": "coriander", "caukuflower": "cauliflower",
    "mangerout": "mangetout", "bing bags": "bin bags", "picksle": "pickle",
    "bacon": "bacon", "bacen": "bacon", "baeon": "bacon",
    "biscuts": "biscuits", "biscits": "biscuits",
    "steradents": "steradent", "steradant": "steradent",
  };

  const seen = new Set();
  const parsed = [];

  lines.forEach(line => {
    let l = line.trim();
    if (!l || l.length < 2) return;

    // Skip lines that look like noise (dates, times, URLs)
    if (/https?:\/\//.test(l)) return;
    if (/^\d{1,2}[.:]\d{2}/.test(l)) return;

    const source = l;
    l = l.toLowerCase();

    // Apply typo corrections
    for (const [wrong, right] of Object.entries(typoMap)) {
      l = l.replace(wrong, right);
    }

    // Extract leading quantity: "2 x 6", "1 x 4 pints", "2 packs", "4", etc.
    const qtyMatch = l.match(/^(\d+\s*(?:x\s*\d+)?(?:\s*(?:pack|packs|pints?|bottles?|tins?|jars?|boxes?|tubes?))?)\s+(.+)/i);
    let qty = "";
    let name = l;
    if (qtyMatch) {
      qty = qtyMatch[1].trim();
      name = qtyMatch[2].trim();
    }

    // Deduplicate by name
    if (seen.has(name)) return;
    seen.add(name);

    parsed.push({ name, qty, source });
  });

  if (!parsed.length) {
    setStatus("error", "Nothing to build — paste or scan a list first");
    return;
  }

  renderStructured(parsed);
  setStatus("success", `${parsed.length} items ready`);
}

// ─── CATEGORY DETECTION ──────────────────────────────────────────────────────

function detectCategory(name) {
  const n = name.toLowerCase();
  for (const [cat, keywords] of Object.entries(categories)) {
    if (keywords.some(k => n.includes(k))) return cat;
  }
  return "Other";
}

// ─── RENDER ──────────────────────────────────────────────────────────────────

function renderStructured(parsed) {
  items = [];

  const grouped = {};
  const seen = new Set();

  parsed.forEach(obj => {
    const key = obj.name.toLowerCase().trim();
    if (seen.has(key)) return;
    seen.add(key);

    const cat = detectCategory(obj.name);
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(obj);
    items.push({ name: obj.name, done: false });
  });

  const catOrder = ["Protein", "Fruit & Veg", "Dairy", "Bread & Carbs", "Pantry", "Household", "Snacks", "Drinks", "Pharmacy", "Other"];
  const orderedKeys = catOrder.filter(c => grouped[c]).concat(Object.keys(grouped).filter(c => !catOrder.includes(c)));

  const container = document.getElementById("list");
  container.innerHTML = "";

  orderedKeys.forEach(section => {
    const grp = grouped[section];
    const sec = document.createElement("div");
    sec.className = "section";

    sec.innerHTML = `<div class="section-header"><span>${section}</span><span class="section-count">${grp.length}</span></div>`;

    grp.forEach((obj, _) => {
      const idx = items.findIndex(i => i.name === obj.name);
      const display = obj.qty ? `<strong>${obj.qty}</strong> ${obj.name}` : obj.name;

      const div = document.createElement("div");
      div.className = "item";
      div.id = `item-${idx}`;
      div.innerHTML = `
        <button class="item-check" onclick="toggle(${idx})"></button>
        <div class="item-info">
          <div class="item-name">${display}</div>
          ${obj.source && obj.source.toLowerCase() !== obj.name.toLowerCase() ? `<div class="item-source">${obj.source}</div>` : ''}
        </div>
        <button class="item-search" onclick="searchTesco('${obj.name.replace(/'/g, "\\'")}')">Tesco</button>
      `;
      sec.appendChild(div);
    });

    container.appendChild(sec);
  });

  const prog = document.getElementById("progress");
  prog.style.display = "block";
  checkHabits();
  updateProgress();
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────

function toggle(i) {
  items[i].done = !items[i].done;
  const el = document.getElementById(`item-${i}`);
  if (el) el.classList.toggle("done", items[i].done);
  updateProgress();
}

function updateProgress() {
  const done = items.filter(i => i.done).length;
  const total = items.length;
  const prog = document.getElementById("progress");
  prog.textContent = `${done} / ${total}`;
  prog.className = "progress-pill" + (done === total && total > 0 ? " active" : "");
}

function searchTesco(q) {
  window.open(`https://www.tesco.com/groceries/en-GB/search?query=${encodeURIComponent(q)}`);
}

function checkHabits() {
  const names = items.map(i => i.name.toLowerCase());
  const missing = usuals.filter(u => !names.some(n => n.includes(u)));
  const bar = document.getElementById("habitsBar");
  if (missing.length) {
    bar.textContent = "💡 You usually buy: " + missing.join(", ");
    bar.classList.add("visible");
  } else {
    bar.classList.remove("visible");
  }
}
</script>
</body>
</html>
